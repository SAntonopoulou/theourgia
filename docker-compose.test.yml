# Theourgia — test-only postgres instances for daemon + registry
#
# Each service has its own DB on its own host-bound port so the dev
# stack (5432) can run in parallel without conflicting:
#
#   - daemon-pg:    5532 → 5432 (in-container)
#   - registry-pg:  5533 → 5432 (in-container)
#
# Tests opt into the real-DB path by reading
# THEOURGIA_AGENT_TEST_DATABASE_URL or THEOURGIA_REGISTRY_TEST_DATABASE_URL.
# When unset, integration tests skip cleanly (the existing
# `postgres_url`-shaped fixtures degrade gracefully).
#
# Bring up:
#   docker compose -f docker-compose.test.yml up -d
#   THEOURGIA_AGENT_TEST_DATABASE_URL=postgresql+asyncpg://theourgia:theourgia@localhost:5532/theourgia_agent_test \
#   THEOURGIA_REGISTRY_TEST_DATABASE_URL=postgresql+asyncpg://theourgia:theourgia@localhost:5533/theourgia_registry_test \
#     pytest agent-daemon/tests registry/tests
#
# Tear down:
#   docker compose -f docker-compose.test.yml down -v

name: theourgia-test

services:
  daemon-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: theourgia
      POSTGRES_PASSWORD: theourgia
      POSTGRES_DB: theourgia_agent_test
    ports:
      - "127.0.0.1:5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theourgia -d theourgia_agent_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
    # ^ tmpfs makes each container restart a clean slate — tests should
    #   never depend on prior state across runs.

  registry-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: theourgia
      POSTGRES_PASSWORD: theourgia
      POSTGRES_DB: theourgia_registry_test
    ports:
      - "127.0.0.1:5533:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theourgia -d theourgia_registry_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
