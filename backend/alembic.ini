# Theourgia — Alembic configuration
# https://alembic.sqlalchemy.org/

[alembic]
# Path to the migration scripts directory, relative to this file.
script_location = alembic

# Template for new migration filenames.
# Format: NNN_short-description.py with a 4-digit incrementing prefix.
file_template = %%(rev)s_%%(slug)s

# Database URL is supplied at runtime by env.py from Theourgia settings;
# this placeholder must be present for Alembic but is not used.
sqlalchemy.url = postgresql+psycopg://placeholder

# Timezone for migration timestamps (Alembic version-tracking purposes only)
timezone = UTC

# Truncate slug to 40 chars for nicer filenames
truncate_slug_length = 40

# Output formatting
output_encoding = utf-8

# Hooks: run Ruff format on every generated migration file
[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
