# Grafana dashboard provider — loads the bundled dashboards from disk.
apiVersion: 1

providers:
  - name: theourgia
    folder: Theourgia
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
