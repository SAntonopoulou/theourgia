# Celery beat is a singleton scheduler: exactly one replica, Recreate
# strategy so a rolling update can never briefly run two beats (which
# would double-fire scheduled jobs such as backups and digests).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "theourgia.fullname" . }}-celery-beat
  labels:
    {{- include "theourgia.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "theourgia.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-beat
  template:
    metadata:
      labels:
        {{- include "theourgia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-beat
      {{- if not .Values.secrets.existingSecret }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- end }}
    spec:
      {{- include "theourgia.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: celery-beat
          image: {{ include "theourgia.image" (dict "image" .Values.backend.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - theourgia.workers.app
            - beat
            - --loglevel=info
          env:
            {{- include "theourgia.coreEnv" . | nindent 12 }}
            {{- with .Values.config.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.celeryBeat.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
