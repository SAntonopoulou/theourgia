# Theourgia CI workflow
#
# **v1.0 re-enable (2026-07-20).** Through v0.x this ran only the three
# cheap security jobs (identity/secret/telemetry) because the full suite
# ran locally before every push. For v1.0 the enforcing test + typecheck
# gates come back on, run against a real pgvector Postgres.
#
# Lint (ruff/mypy/biome) runs ADVISORY (continue-on-error) rather than
# blocking: the repo carries a large default-config lint baseline that is
# a v1.x cleanup effort, not a v1.0 blocker. The advisory jobs surface
# the signal without gating the merge; the enforcing gates are the tests,
# the typecheck, and the security jobs. The full strict job set is
# preserved at commit 6afc51a.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.13"

jobs:
  # ── Security (always enforcing) ─────────────────────────────────────────
  identity:
    name: identity-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify commit authors
        run: |
          set -euo pipefail
          ALLOWED=("santonopoulou@protonmail.com" "s.willowood@acg.edu" "sophia@opaseltd.com")
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="${{ github.event.before }}..${{ github.event.after }}"
          fi
          if [[ "$range" == "0000000000000000000000000000000000000000..."* ]]; then
            range="HEAD~1..HEAD"
          fi
          mapfile -t emails < <(git log --format=%ae "$range" 2>/dev/null | sort -u)
          for email in "${emails[@]}"; do
            ok=false
            for allowed in "${ALLOWED[@]}"; do
              [[ "$email" == "$allowed" ]] && ok=true
            done
            if ! $ok; then
              echo "::error::commit author '$email' is not on the SAntonopoulou allowlist"
              exit 1
            fi
            echo "OK $email"
          done

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_NOTIFY_USER_LIST: "@SAntonopoulou"

  no-telemetry:
    name: no-telemetry-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Run verifier
        working-directory: backend
        run: |
          uv sync --all-extras --dev
          uv run python -m theourgia.scripts.verify_zero_telemetry

  # ── Enforcing gates ─────────────────────────────────────────────────────
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector build required — migration 0001 CREATE EXTENSION vector.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: theourgia
          POSTGRES_PASSWORD: theourgia
          POSTGRES_DB: theourgia_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U theourgia"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://theourgia:theourgia@localhost:5432/theourgia_test
      THEOURGIA_TEST_DATABASE_URL: postgresql+asyncpg://theourgia:theourgia@localhost:5432/theourgia_test
      REDIS_URL: redis://localhost:6379/0
      THEOURGIA_ENV: test
      THEOURGIA_SECRET_KEY: ci-test-secret-key-not-for-any-real-deployment
      THEOURGIA_MASTER_ENCRYPTION_KEY: ci-test-master-key-not-for-any-real-deployment
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Sync deps
        working-directory: backend
        run: uv sync --all-extras --dev
      - name: Migrate test database (proves the chain replays from zero)
        working-directory: backend
        run: uv run alembic upgrade head
      - name: pytest
        working-directory: backend
        run: uv run pytest -q

  frontend-typecheck:
    name: frontend-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: tsc (per workspace)
        run: pnpm -r exec tsc --noEmit

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: vitest (shared + admin)
        run: pnpm -r test

  # ── Advisory (non-blocking until the v1.x lint-baseline cleanup) ─────────
  lint:
    name: lint-advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Sync deps
        working-directory: backend
        run: uv sync --all-extras --dev
      - name: Ruff
        working-directory: backend
        run: uv run ruff check . || true
      - name: mypy
        working-directory: backend
        run: uv run mypy theourgia || true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Biome
        run: pnpm exec biome check . || true
