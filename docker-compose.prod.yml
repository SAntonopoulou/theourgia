# Theourgia — production overrides for docker-compose
#
# Use:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Or:   just up-prod
#
# Differences from base:
#   - All required secrets must be set in .env (no dev fallbacks)
#   - Backend without --reload, with multiple workers
#   - Internal Caddy (frontend service) bound to 127.0.0.1:8190 — the host
#     shared Caddy (e.g., agent-house pattern) reverse-proxies to this port
#   - No postgres / redis external port bindings — strictly internal
#   - Restart policies set to unless-stopped
#   - Logging driver configured for production observability

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    command: ["uvicorn", "theourgia.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${THEOURGIA_WORKERS:-4}"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery:
    build:
      target: prod
    # Backup sources (v1-023): the deploy dir mounts read-only at its
    # host path so restic's default include path reads the real files
    # (.env, compose, manual dumps); the spool volume receives the
    # pg_dump pre-step. PGDATA lives in a Docker volume and is NEVER
    # file-backed-up — the dump is the database backup.
    volumes:
      - .:/srv/theourgia/prod:ro
      - backup_spool:/var/spool/theourgia-backup
    environment:
      THEOURGIA_BACKUP_INCLUDE_PATHS: '["/srv/theourgia/prod"]'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  celery-beat:
    build:
      target: prod
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    ports:
      # Bound to host loopback only. Host shared Caddy reverse-proxies here.
      # 8190 is Theourgia's reserved entry-point port in the agent-house
      # convention; self-hosters may pick any port in their reserved block
      # by overriding via .env (THEOURGIA_FRONTEND_HOST_PORT).
      - "127.0.0.1:${THEOURGIA_FRONTEND_HOST_PORT:-8190}:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  agent-daemon:
    build:
      context: ./agent-daemon
      dockerfile: Dockerfile
      target: prod
    command: ["uvicorn", "theourgia_agent.api.app:app", "--host", "0.0.0.0", "--port", "8002", "--workers", "${THEOURGIA_AGENT_WORKERS:-2}"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
      target: prod
    command: ["uvicorn", "theourgia_registry.api.app:app", "--host", "0.0.0.0", "--port", "8003", "--workers", "${THEOURGIA_REGISTRY_WORKERS:-2}"]
    ports:
      # plugins.theourgia.com — bound to host loopback only; host Caddy
      # routes plugins.theourgia.com 443 → 127.0.0.1:8193.
      - "127.0.0.1:${THEOURGIA_REGISTRY_HOST_PORT:-8193}:8003"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  backup_spool:
    driver: local
