{{- /*
Plugin registry — opt-in, disabled by default. Most instances consume
plugins from the canonical registry (plugins.theourgia.com); enable this
only to host your own. Requires its own PostgreSQL database and, for
plugin tarball storage, S3-compatible credentials supplied via
registry.extraEnv (THEOURGIA_REGISTRY_R2_*, AWS_ACCESS_KEY_ID,
AWS_SECRET_ACCESS_KEY).
*/ -}}
{{- if .Values.registry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "theourgia.fullname" . }}-registry
  labels:
    {{- include "theourgia.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "theourgia.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: registry
  template:
    metadata:
      labels:
        {{- include "theourgia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: registry
      {{- if not .Values.secrets.existingSecret }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- end }}
    spec:
      {{- include "theourgia.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: registry
          image: {{ include "theourgia.image" (dict "image" .Values.registry.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - uvicorn
            - theourgia_registry.api.app:app
            - --host
            - 0.0.0.0
            - --port
            - "8003"
            - --workers
            - {{ .Values.registry.workers | quote }}
          ports:
            - name: http
              containerPort: 8003
          env:
            - name: THEOURGIA_REGISTRY_ENV
              value: {{ .Values.config.env | quote }}
            - name: THEOURGIA_REGISTRY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "theourgia.secretName" . }}
                  key: THEOURGIA_REGISTRY_DATABASE_URL
            - name: THEOURGIA_REGISTRY_BOOTSTRAP_MAINTAINER_DID
              value: {{ .Values.registry.bootstrapMaintainerDid | quote }}
            {{- with .Values.registry.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.registry.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "theourgia.fullname" . }}-registry
  labels:
    {{- include "theourgia.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  type: ClusterIP
  selector:
    {{- include "theourgia.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
  ports:
    - name: http
      port: 8003
      targetPort: http
{{- end }}
