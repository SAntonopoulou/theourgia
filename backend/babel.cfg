# Babel message-extraction configuration.
#
# Used by `pybabel extract -F babel.cfg -k _ -k _lazy -k _n -k _n_lazy
# -k gettext -k gettext_lazy -k ngettext -k ngettext_lazy
# -o locales/messages.pot theourgia/`
# to scan source for translatable strings.
#
# Run from the backend/ directory; the resulting .pot is then merged
# into per-locale .po files via `pybabel update`.

[python: theourgia/**.py]
encoding = utf-8

[python: tests/**.py]
encoding = utf-8
