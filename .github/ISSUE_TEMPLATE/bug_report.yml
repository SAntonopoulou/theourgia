name: Bug report
description: Something is not working as documented. (Not a security issue — use the private channel for those.)
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. **Please do not include
        secrets, API tokens, or private content in this report.** If the bug
        involves sensitive data, describe the shape of the problem without
        the data itself.

        Security vulnerabilities should be reported privately via the
        Security Advisory channel, not as a public issue.

  - type: input
    id: version
    attributes:
      label: Theourgia version
      description: "Run `theourgia --version` or check the footer of your instance."
      placeholder: "v0.0.0-dev"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Self-hosted (Docker Compose, your own server)
        - Self-hosted (custom — describe in steps)
        - Devcontainer (local development)
        - theourgia.com hosted (when available)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear description of what occurred. Include screenshots if helpful (and not sensitive).
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list of steps. Smaller and more specific is better.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Logs from the backend or browser console. Redact anything sensitive.
        Use code blocks for readability.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, browser, etc."
      placeholder: "Debian 13, Firefox 132, Docker 27.3"

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have removed all secrets and private content from this report
          required: true
        - label: This is not a security vulnerability (those go through the private channel)
          required: true
