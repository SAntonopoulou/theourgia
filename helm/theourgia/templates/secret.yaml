{{- /*
Chart-managed Secret. Not rendered when secrets.existingSecret is set —
in that case every secretKeyRef in the chart points at the operator's own
Secret instead (see values.yaml for the expected keys).
*/ -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "theourgia.fullname" . }}
  labels:
    {{- include "theourgia.labels" . | nindent 4 }}
type: Opaque
stringData:
  THEOURGIA_SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  THEOURGIA_MASTER_ENCRYPTION_KEY: {{ .Values.secrets.masterEncryptionKey | quote }}
  DATABASE_URL: {{ include "theourgia.databaseUrl" . | quote }}
  REDIS_URL: {{ include "theourgia.redisUrl" . | quote }}
  {{- if .Values.postgresql.internal.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.internal.auth.password | quote }}
  {{- end }}
  {{- if .Values.agentDaemon.enabled }}
  THEOURGIA_AGENT_CONTROL_TOKEN: {{ .Values.secrets.agentControlToken | quote }}
  THEOURGIA_AGENT_HKDF_SALT: {{ .Values.secrets.agentHkdfSalt | quote }}
  THEOURGIA_AGENT_DATABASE_URL: {{ .Values.agentDaemon.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.registry.enabled }}
  THEOURGIA_REGISTRY_DATABASE_URL: {{ .Values.registry.databaseUrl | quote }}
  {{- end }}
{{- end }}
