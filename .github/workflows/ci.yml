# Theourgia CI workflow
#
# **PARED DOWN AS OF 2026-06-21.** During v0.x development we run the
# full test suite locally before every push (see
# feedback_run_tests_as_you_develop in project memory) and don't want
# to burn Actions minutes on every commit. This file keeps the small,
# cheap, security-relevant jobs running on push:
#
#   - identity-guard      — prevents OGirly/ShihoSakura attribution mistakes
#   - secret-scan         — gitleaks for committed-secrets detection
#   - no-telemetry-verify — enforces the zero-telemetry promise
#
# Everything else (python-lint, python-test, ts-lint, ts-typecheck,
# markdown-lint, dep-audit, docker-build) is **disabled** and will be
# re-enabled once we reach v1.0. The history is preserved at
# 6afc51a (the cache substrate commit) for the full job set.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs of this workflow for the same ref on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.13"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Identity guard — verify any commits in the PR/push are attributed to an
  # allowlisted SAntonopoulou email. Prevents the OGirly attribution mistake.
  # ────────────────────────────────────────────────────────────────────────
  identity:
    name: identity-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify commit authors
        run: |
          set -euo pipefail
          ALLOWED=("santonopoulou@protonmail.com" "s.willowood@acg.edu" "sophia@opaseltd.com")

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="${{ github.event.before }}..${{ github.event.after }}"
          fi

          # Handle initial push (before is all zeros)
          if [[ "$range" == "0000000000000000000000000000000000000000..."* ]]; then
            range="HEAD~1..HEAD"
          fi

          mapfile -t emails < <(git log --format=%ae "$range" 2>/dev/null | sort -u)

          for email in "${emails[@]}"; do
            ok=false
            for allowed in "${ALLOWED[@]}"; do
              [[ "$email" == "$allowed" ]] && ok=true
            done
            if ! $ok; then
              echo "::error::commit author '$email' is not on the SAntonopoulou allowlist"
              echo "Allowed: ${ALLOWED[*]}"
              exit 1
            fi
            echo "✓ $email"
          done

  # ────────────────────────────────────────────────────────────────────────
  # Secret scanning (gitleaks) — fast, cheap, security-critical.
  # ────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_NOTIFY_USER_LIST: "@SAntonopoulou"

  # ────────────────────────────────────────────────────────────────────────
  # Zero-telemetry verifier — runs the script that enforces our promise.
  # Cheap; protects a load-bearing project commitment.
  # ────────────────────────────────────────────────────────────────────────
  no-telemetry:
    name: no-telemetry-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run verifier
        working-directory: backend
        run: |
          if [ -f theourgia/scripts/verify_zero_telemetry.py ]; then
            uv sync --all-extras --dev
            uv run python -m theourgia.scripts.verify_zero_telemetry
          else
            echo "Zero-telemetry verifier not yet implemented."
            echo "This step will become enforcing once the script lands."
          fi
