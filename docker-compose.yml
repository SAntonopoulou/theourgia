# Theourgia — base docker-compose
#
# Used together with environment-specific overrides:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# By itself this file does not start a complete stack — postgres + redis run,
# but backend / frontend container builds depend on overrides for their build
# target and command. Use `just dev` or `just up-prod` instead of bare compose.

name: theourgia

services:
  # ───────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ───────────────────────────────────────────────────────────────────────
  postgres:
    # pgvector build required — migration 0001 issues CREATE EXTENSION
    # vector. Drop-in replacement for postgres:16-alpine.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${THEOURGIA_DB_USER:-theourgia}
      POSTGRES_PASSWORD: ${THEOURGIA_DB_PASSWORD:?THEOURGIA_DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${THEOURGIA_DB_NAME:-theourgia}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THEOURGIA_DB_USER:-theourgia} -d ${THEOURGIA_DB_NAME:-theourgia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Redis (sessions, cache, Celery broker)
  # ───────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Backend (FastAPI)
  # ───────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      THEOURGIA_ENV: ${THEOURGIA_ENV:-development}
      THEOURGIA_SECRET_KEY: ${THEOURGIA_SECRET_KEY:?THEOURGIA_SECRET_KEY must be set}
      THEOURGIA_MASTER_ENCRYPTION_KEY: ${THEOURGIA_MASTER_ENCRYPTION_KEY:?required}
      THEOURGIA_BASE_URL: ${THEOURGIA_BASE_URL:-https://theourgia.example.com}
      THEOURGIA_INSTANCE_ID: ${THEOURGIA_INSTANCE_ID:-theourgia.example.com}
      THEOURGIA_LOG_LEVEL: ${THEOURGIA_LOG_LEVEL:-info}
      DATABASE_URL: postgresql+asyncpg://${THEOURGIA_DB_USER:-theourgia}:${THEOURGIA_DB_PASSWORD}@postgres:5432/${THEOURGIA_DB_NAME:-theourgia}
      REDIS_URL: redis://redis:6379/0
      THEOURGIA_EPHE_PATH: /app/data/ephe
      THEOURGIA_AGENT_DAEMON_URL: ${THEOURGIA_AGENT_DAEMON_URL:-http://agent-daemon:8002}
      THEOURGIA_AGENT_DAEMON_CONTROL_TOKEN: ${THEOURGIA_AGENT_CONTROL_TOKEN}
      THEOURGIA_REGISTRY_URL: ${THEOURGIA_REGISTRY_URL:-http://registry:8003}
      # b108-2gs: single-operator vault gate. Empty = open enrollment
      # (dev default). Non-empty comma-separated list of magickal names
      # = only listed names may CREATE accounts on this instance;
      # everyone else gets 403 with a pointer to self-host.
      THEOURGIA_ALLOWED_MAGICKAL_NAMES: ${THEOURGIA_ALLOWED_MAGICKAL_NAMES:-}
      # Author + maintainer signing identities (Ed25519 keypair for
      # signed federation envelopes + plugin registry submissions).
      THEOURGIA_AUTHOR_DID: ${THEOURGIA_AUTHOR_DID:-}
      THEOURGIA_AUTHOR_PRIVATE_KEY_PATH: ${THEOURGIA_AUTHOR_PRIVATE_KEY_PATH:-}
      THEOURGIA_MAINTAINER_DID: ${THEOURGIA_MAINTAINER_DID:-}
      THEOURGIA_MAINTAINER_PRIVATE_KEY_PATH: ${THEOURGIA_MAINTAINER_PRIVATE_KEY_PATH:-}
      # WebAuthn relying-party configuration for hardware-key sign-in.
      THEOURGIA_WEBAUTHN_RP_ID: ${THEOURGIA_WEBAUTHN_RP_ID:-}
      THEOURGIA_WEBAUTHN_RP_NAME: ${THEOURGIA_WEBAUTHN_RP_NAME:-Theourgia}
      THEOURGIA_WEBAUTHN_ORIGIN: ${THEOURGIA_WEBAUTHN_ORIGIN:-}
      # b108-2gq: R2 (or any S3-compatible) storage backend. Defaults keep
      # the local filesystem backend for fresh dev bring-ups; production
      # sets THEOURGIA_STORAGE_BACKEND=s3 in .env with the R2 endpoint +
      # credentials.
      THEOURGIA_STORAGE_BACKEND: ${THEOURGIA_STORAGE_BACKEND:-local}
      THEOURGIA_STORAGE_S3_ENDPOINT: ${THEOURGIA_STORAGE_S3_ENDPOINT:-}
      THEOURGIA_STORAGE_S3_BUCKET: ${THEOURGIA_STORAGE_S3_BUCKET:-}
      THEOURGIA_STORAGE_S3_REGION: ${THEOURGIA_STORAGE_S3_REGION:-auto}
      THEOURGIA_STORAGE_S3_ACCESS_KEY: ${THEOURGIA_STORAGE_S3_ACCESS_KEY:-}
      THEOURGIA_STORAGE_S3_SECRET_KEY: ${THEOURGIA_STORAGE_S3_SECRET_KEY:-}
      THEOURGIA_STORAGE_S3_USE_SSL: ${THEOURGIA_STORAGE_S3_USE_SSL:-true}
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Celery worker (background jobs)
  # ───────────────────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "theourgia.workers.app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      THEOURGIA_ENV: ${THEOURGIA_ENV:-development}
      THEOURGIA_SECRET_KEY: ${THEOURGIA_SECRET_KEY}
      THEOURGIA_MASTER_ENCRYPTION_KEY: ${THEOURGIA_MASTER_ENCRYPTION_KEY}
      DATABASE_URL: postgresql+asyncpg://${THEOURGIA_DB_USER:-theourgia}:${THEOURGIA_DB_PASSWORD}@postgres:5432/${THEOURGIA_DB_NAME:-theourgia}
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Celery beat (scheduled jobs)
  # ───────────────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "theourgia.workers.app", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      THEOURGIA_SECRET_KEY: ${THEOURGIA_SECRET_KEY}
      THEOURGIA_MASTER_ENCRYPTION_KEY: ${THEOURGIA_MASTER_ENCRYPTION_KEY}
      DATABASE_URL: postgresql+asyncpg://${THEOURGIA_DB_USER:-theourgia}:${THEOURGIA_DB_PASSWORD}@postgres:5432/${THEOURGIA_DB_NAME:-theourgia}
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Agent daemon (Phase 16) — separate process for AI agent supervision.
  # Its own DB so daemon failures can't poison the vault.
  # Mounted memory dir for agent filesystem (rule 59).
  # ───────────────────────────────────────────────────────────────────────
  agent-daemon-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${THEOURGIA_AGENT_DB_USER:-theourgia}
      POSTGRES_PASSWORD: ${THEOURGIA_AGENT_DB_PASSWORD:?THEOURGIA_AGENT_DB_PASSWORD must be set}
      POSTGRES_DB: ${THEOURGIA_AGENT_DB_NAME:-theourgia_agent}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - agent_daemon_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THEOURGIA_AGENT_DB_USER:-theourgia} -d ${THEOURGIA_AGENT_DB_NAME:-theourgia_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - theourgia-internal

  agent-daemon:
    build:
      context: ./agent-daemon
      dockerfile: Dockerfile
    depends_on:
      agent-daemon-pg:
        condition: service_healthy
    environment:
      THEOURGIA_AGENT_ENV: ${THEOURGIA_ENV:-development}
      THEOURGIA_AGENT_DATABASE_URL: postgresql+asyncpg://${THEOURGIA_AGENT_DB_USER:-theourgia}:${THEOURGIA_AGENT_DB_PASSWORD}@agent-daemon-pg:5432/${THEOURGIA_AGENT_DB_NAME:-theourgia_agent}
      THEOURGIA_AGENT_VAULT_MCP_URL: http://backend:8000/mcp
      THEOURGIA_AGENT_CONTROL_TOKEN: ${THEOURGIA_AGENT_CONTROL_TOKEN:?THEOURGIA_AGENT_CONTROL_TOKEN must be set}
      THEOURGIA_AGENT_HKDF_SALT: ${THEOURGIA_AGENT_HKDF_SALT:?THEOURGIA_AGENT_HKDF_SALT must be set}
      THEOURGIA_AGENT_LISTEN_HOST: 0.0.0.0
      THEOURGIA_AGENT_LISTEN_PORT: "8002"
    volumes:
      - agent_memory:/srv/theourgia/agents
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Plugin registry (plugins.theourgia.com) — separate process + DB
  # ───────────────────────────────────────────────────────────────────────
  registry-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${THEOURGIA_REGISTRY_DB_USER:-theourgia}
      POSTGRES_PASSWORD: ${THEOURGIA_REGISTRY_DB_PASSWORD:?THEOURGIA_REGISTRY_DB_PASSWORD must be set}
      POSTGRES_DB: ${THEOURGIA_REGISTRY_DB_NAME:-theourgia_registry}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - registry_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THEOURGIA_REGISTRY_DB_USER:-theourgia} -d ${THEOURGIA_REGISTRY_DB_NAME:-theourgia_registry}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - theourgia-internal

  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    depends_on:
      registry-pg:
        condition: service_healthy
    environment:
      THEOURGIA_REGISTRY_ENV: ${THEOURGIA_ENV:-development}
      THEOURGIA_REGISTRY_DATABASE_URL: postgresql+asyncpg://${THEOURGIA_REGISTRY_DB_USER:-theourgia}:${THEOURGIA_REGISTRY_DB_PASSWORD}@registry-pg:5432/${THEOURGIA_REGISTRY_DB_NAME:-theourgia_registry}
      THEOURGIA_REGISTRY_BOOTSTRAP_MAINTAINER_DID: ${THEOURGIA_REGISTRY_BOOTSTRAP_MAINTAINER_DID:-}
      # b108-2gq: R2 storage for plugin tarballs.
      THEOURGIA_REGISTRY_R2_BUCKET: ${THEOURGIA_REGISTRY_R2_BUCKET:-}
      THEOURGIA_REGISTRY_R2_ENDPOINT: ${THEOURGIA_REGISTRY_R2_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    restart: unless-stopped
    networks:
      - theourgia-internal

  # ───────────────────────────────────────────────────────────────────────
  # Frontend (static-served by internal Caddy; reverse-proxies API to backend)
  # ───────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - theourgia-internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  agent_daemon_data:
    driver: local
  registry_data:
    driver: local
  agent_memory:
    driver: local

networks:
  theourgia-internal:
    driver: bridge
    # Internal-only network — no external interface bindings here.
    # Per-environment overrides expose specific services to host as needed.
