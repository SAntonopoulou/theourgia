apiVersion: v1
kind: Service
metadata:
  name: {{ include "theourgia.fullname" . }}-backend
  labels:
    {{- include "theourgia.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "theourgia.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- if .Values.frontend.backendAliasService }}
---
# Alias Service named literally "backend": the frontend image's bundled
# Caddyfile (frontend/Caddyfile.internal) reverse-proxies API, federation,
# and websocket routes to the fixed hostname "backend:8000" — the same
# name the Docker Compose stack resolves. This implies at most one
# Theourgia release per namespace. Disable via
# frontend.backendAliasService=false if you provide your own alias.
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "theourgia.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-alias
spec:
  type: ClusterIP
  selector:
    {{- include "theourgia.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- end }}
