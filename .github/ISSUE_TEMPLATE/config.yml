blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/SAntonopoulou/theourgia/security/advisories/new
    about: |
      Report a security vulnerability privately. Do not open a public issue
      for security problems — use this private channel instead.
  - name: Code of Conduct concern
    url: https://github.com/SAntonopoulou/theourgia/security/advisories/new
    about: |
      Report a Code of Conduct concern privately. Use the same private
      channel as security disclosures; select "Code of Conduct" in the
      subject line.
  - name: Question or discussion
    url: https://github.com/SAntonopoulou/theourgia/discussions
    about: |
      For general questions, ideas, or discussion (not actionable bug
      reports or feature requests), use Discussions.
